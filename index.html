<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CreoChat | Firebase Мессенджер</title>
    <!-- Firebase SDK (правильные модули для версии 9+) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0e121c;
            overflow: hidden;
        }

        .creochat-app {
            width: 100vw;
            height: 100vh;
            background: #0f1724;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .main-header {
            background: #1a2332;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d3a4e;
            flex-shrink: 0;
        }
        .logo-area { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .logo-area h1 { font-size: 1.4rem; color: #2dd4bf; }
        .device-badge { background: #0d1b2a; padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; color: #2dd4bf; border: 1px solid #2dd4bf40; }
        .shield-badges { display: flex; gap: 12px; flex-wrap: wrap; }
        .shield-badges span { background: #0d1b2a; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; color: #5ee0d0; }

        .messenger-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .sidebar {
            width: 320px;
            background: #111827;
            border-right: 1px solid #1f2a3e;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #1f2a3e; }
        .tabs-mini { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-mini { flex: 1; background: #1e2a3a; border: none; padding: 10px; border-radius: 28px; color: #9ca3af; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .tab-mini.active { background: #2dd4bf20; color: #2dd4bf; border: 1px solid #2dd4bf; }
        .chat-list { list-style: none; padding: 0 12px; }
        .chat-item { background: #1a2536; margin: 8px 0; padding: 14px; border-radius: 16px; cursor: pointer; transition: 0.1s; border-left: 3px solid #2dd4bf; }
        .chat-item:hover { background: #243447; }
        .chat-name { font-weight: bold; color: #e2e8f0; }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f1724;
            min-width: 0;
        }
        .chat-header { padding: 16px 24px; background: #1a2536; border-bottom: 1px solid #2d3a4e; flex-shrink: 0; }
        .chat-header strong { font-size: 1.2rem; color: #2dd4bf; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-bubble {
            max-width: 65%;
            padding: 12px 18px;
            border-radius: 24px;
            background: #1e2a3a;
            color: #e2e8f0;
            align-self: flex-start;
            word-break: break-word;
        }
        .message-bubble.own { align-self: flex-end; background: #2dd4bf20; border: 1px solid #2dd4bf; }
        .message-bubble strong { color: #2dd4bf; font-size: 0.85rem; }

        .input-panel {
            background: #1a2536;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #2d3a4e;
            flex-shrink: 0;
        }
        .attach-btn { background: #2d3a4e; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; color: white; }
        .message-input { flex: 1; background: #0f1724; border: 1px solid #2d3a4e; padding: 12px 18px; border-radius: 40px; color: white; outline: none; }
        .send-btn { background: #2dd4bf; border: none; padding: 12px 28px; border-radius: 40px; font-weight: bold; color: #0f1724; cursor: pointer; }

        .right-panel {
            width: 300px;
            background: #111827;
            border-left: 1px solid #1f2a3e;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .info-card { background: #1a2536; border-radius: 24px; padding: 18px; margin-bottom: 20px; }
        .info-card h3 { color: #2dd4bf; margin-bottom: 12px; }
        button.small { padding: 8px 16px; font-size: 0.8rem; background: #2d3a4e; border: none; border-radius: 30px; color: white; cursor: pointer; width: 100%; margin-top: 8px; }
        input { background: #0f1724; border: 1px solid #2d3a4e; padding: 10px 14px; border-radius: 30px; color: white; width: 100%; margin-bottom: 10px; outline: none; }
        hr { border-color: #2d3a4e; margin: 12px 0; }
        .loading { text-align: center; padding: 40px; color: #2dd4bf; }
        .error-msg { color: #ff6b6b; font-size: 12px; text-align: center; margin-top: 8px; }
        
        @media (max-width: 900px) { .right-panel { display: none; } .sidebar { width: 280px; } }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 56px; height: calc(100% - 56px); z-index: 100; transform: translateX(-100%); width: 280px; transition: transform 0.3s; }
            .sidebar.mobile-open { transform: translateX(0); }
            .mobile-menu-btn { display: block; }
            .message-bubble { max-width: 85%; }
        }
        .mobile-menu-btn { display: none; background: #2d3a4e; border: none; padding: 8px 14px; border-radius: 20px; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div id="appRoot" class="creochat-app"></div>

<script>
    // ======================== ВАШИ FIREBASE КЛЮЧИ (ИСПРАВЛЕНО) ========================
    // Firebase configuration (ваши данные, правильно отформатированные)
    const firebaseConfig = {
        apiKey: "AIzaSyCN1nSMxZDtXPx45-ruKr6He85gLOafEJY",
        authDomain: "creochat.firebaseapp.com",
        projectId: "creochat",
        storageBucket: "creochat.firebasestorage.app",
        messagingSenderId: "326245083693",
        appId: "1:326245083693:web:a3fd8e44e11d5a3d9366a4",
        measurementId: "G-63SHRQWWRJ"
    };
    
    // Инициализация Firebase (исправлено: используем совместимую версию)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // Включаем сохранение сессии (автоматический вход после перезагрузки)
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .then(() => console.log('✅ Сессия сохраняется локально'))
        .catch(err => console.warn('Ошибка persistence:', err));
    
    // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ========================
    let currentUser = null;         // Firebase user
    let currentUserData = null;     // Документ пользователя в Firestore
    let activeChat = { type: 'friends', id: null };
    let currentDevice = localStorage.getItem('creo_deviceType') || 'pc';
    let messagesUnsubscribe = null;
    
    // ======================== ФУНКЦИИ РАБОТЫ С FIRESTORE ========================
    
    // Создание/получение профиля пользователя
    async function initUserProfile(user) {
        const userRef = db.collection('users').doc(user.uid);
        const doc = await userRef.get();
        if (!doc.exists) {
            const profile = {
                uid: user.uid,
                email: user.email,
                displayName: user.email.split('@')[0],
                friends: [],
                friendRequests: [],
                channels: [],
                groups: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await userRef.set(profile);
            return profile;
        }
        return doc.data();
    }
    
    // Загрузка данных текущего пользователя
    async function loadCurrentUserData() {
        if (currentUser) {
            const userRef = db.collection('users').doc(currentUser.uid);
            const doc = await userRef.get();
            if (doc.exists) {
                currentUserData = { uid: currentUser.uid, ...doc.data() };
            }
        }
    }
    
    // Получение списка друзей
    async function getFriendsList() {
        if (!currentUserData) return [];
        const friendsData = [];
        for (const friendUid of currentUserData.friends || []) {
            const friendDoc = await db.collection('users').doc(friendUid).get();
            if (friendDoc.exists) {
                friendsData.push({ uid: friendUid, ...friendDoc.data() });
            }
        }
        return friendsData;
    }
    
    // Получение заявок
    async function getFriendRequests() {
        if (!currentUserData) return [];
        const requests = [];
        for (const reqUid of currentUserData.friendRequests || []) {
            const reqDoc = await db.collection('users').doc(reqUid).get();
            if (reqDoc.exists) {
                requests.push({ uid: reqUid, ...reqDoc.data() });
            }
        }
        return requests;
    }
    
    // Отправить заявку
    async function sendFriendRequest(targetUid) {
        if (!currentUser || targetUid === currentUser.uid) return;
        const targetRef = db.collection('users').doc(targetUid);
        const targetDoc = await targetRef.get();
        if (targetDoc.exists) {
            const currentRequests = targetDoc.data().friendRequests || [];
            if (!currentRequests.includes(currentUser.uid)) {
                await targetRef.update({
                    friendRequests: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                });
            }
        }
    }
    
    // Принять заявку
    async function acceptFriendRequest(fromUid) {
        if (!currentUserData) return;
        await db.collection('users').doc(currentUser.uid).update({
            friends: firebase.firestore.FieldValue.arrayUnion(fromUid),
            friendRequests: firebase.firestore.FieldValue.arrayRemove(fromUid)
        });
        await db.collection('users').doc(fromUid).update({
            friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
        });
        await loadCurrentUserData();
    }
    
    // Отклонить заявку
    async function declineFriendRequest(fromUid) {
        await db.collection('users').doc(currentUser.uid).update({
            friendRequests: firebase.firestore.FieldValue.arrayRemove(fromUid)
        });
        await loadCurrentUserData();
    }
    
    // Создать канал
    async function createChannel(name) {
        if (!name || !currentUser) return;
        const channelRef = db.collection('channels').doc();
        await channelRef.set({
            name: name,
            owner: currentUser.uid,
            members: [currentUser.uid],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('users').doc(currentUser.uid).update({
            channels: firebase.firestore.FieldValue.arrayUnion(channelRef.id)
        });
        await loadCurrentUserData();
    }
    
    // Создать группу
    async function createGroup(name) {
        if (!name || !currentUser) return;
        const groupRef = db.collection('groups').doc();
        await groupRef.set({
            name: name,
            owner: currentUser.uid,
            members: [currentUser.uid],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('users').doc(currentUser.uid).update({
            groups: firebase.firestore.FieldValue.arrayUnion(groupRef.id)
        });
        await loadCurrentUserData();
    }
    
    // Получить каналы пользователя
    async function getUserChannels() {
        if (!currentUserData || !currentUserData.channels) return [];
        const channels = [];
        for (const chanId of currentUserData.channels) {
            const chan = await db.collection('channels').doc(chanId).get();
            if (chan.exists) channels.push({ id: chanId, ...chan.data() });
        }
        return channels;
    }
    
    // Получить группы пользователя
    async function getUserGroups() {
        if (!currentUserData || !currentUserData.groups) return [];
        const groups = [];
        for (const grpId of currentUserData.groups) {
            const grp = await db.collection('groups').doc(grpId).get();
            if (grp.exists) groups.push({ id: grpId, ...grp.data() });
        }
        return groups;
    }
    
    // Отправка сообщения
    async function sendMessage(chatId, chatType, text, fileData = null) {
        if (!currentUser || !chatId) return;
        const messagesRef = db.collection('messages');
        await messagesRef.add({
            chatId: chatId,
            chatType: chatType,
            from: currentUser.uid,
            fromName: currentUserData?.displayName || currentUser.email,
            text: text || '',
            file: fileData || null,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    
    // Подписка на сообщения
    function subscribeToMessages(chatId, chatType, callback) {
        return db.collection('messages')
            .where('chatId', '==', chatId)
            .where('chatType', '==', chatType)
            .orderBy('timestamp', 'asc')
            .onSnapshot(snapshot => {
                const messages = [];
                snapshot.forEach(doc => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                callback(messages);
            });
    }
    
    // ======================== ОТРИСОВКА ИНТЕРФЕЙСА ========================
    
    async function renderUI() {
        const isLogged = !!currentUser;
        const isMobile = (currentDevice === 'phone') || (window.innerWidth <= 768);
        
        let friendsList = [];
        let friendRequests = [];
        let channelsList = [];
        let groupsList = [];
        
        if (isLogged && currentUserData) {
            friendsList = await getFriendsList();
            friendRequests = await getFriendRequests();
            channelsList = await getUserChannels();
            groupsList = await getUserGroups();
            
            if (activeChat.id) {
                if (messagesUnsubscribe) messagesUnsubscribe();
                messagesUnsubscribe = subscribeToMessages(activeChat.id, activeChat.type, (msgs) => {
                    renderMessagesContainer(msgs);
                });
            }
        }
        
        const html = `
        <div class="main-header">
            <div class="logo-area">
                ${isMobile ? `<button id="mobileMenuToggle" class="mobile-menu-btn">☰</button>` : ''}
                <h1>🔥 CreoChat</h1>
                <div class="device-badge">${currentDevice === 'phone' ? '📱 Мобильный' : '💻 ПК'}</div>
            </div>
            <div class="shield-badges">
                <span>🔥 Firebase Cloud</span>
                <span>🔐 Auto-save</span>
                ${isLogged ? `<span>👤 ${currentUserData?.displayName || currentUser.email}</span><button id="logoutBtn" style="background:#2d3a4e;border:none;padding:4px 14px;border-radius:20px;cursor:pointer;">Выйти</button>` : '<span>🔐 Не авторизован</span>'}
            </div>
        </div>
        <div class="messenger-layout">
            <div class="sidebar" id="mainSidebar">
                <div class="sidebar-header">
                    <div class="tabs-mini">
                        <button class="tab-mini ${activeChat.type === 'friends' ? 'active' : ''}" data-side="friends">👥 Друзья (${friendsList.length})</button>
                        <button class="tab-mini ${activeChat.type === 'channels' ? 'active' : ''}" data-side="channels">📢 Каналы (${channelsList.length})</button>
                        <button class="tab-mini ${activeChat.type === 'groups' ? 'active' : ''}" data-side="groups">💬 Группы (${groupsList.length})</button>
                    </div>
                </div>
                <ul class="chat-list" id="chatListSidebar">
                    ${!isLogged ? '<li style="color:gray;padding:12px;">Войдите в аккаунт</li>' : renderSidebarList(activeChat.type, friendsList, friendRequests, channelsList, groupsList)}
                </ul>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <strong>${activeChat.id ? getChatTitle(activeChat.type, activeChat.id, friendsList, channelsList, groupsList) : '📡 Выберите чат'}</strong>
                </div>
                <div class="messages-container" id="messagesContainer">
                    ${!activeChat.id ? '<div style="color:#6c86a3;text-align:center;margin-top:40px;">💬 Выберите чат слева</div>' : '<div class="loading">Загрузка сообщений...</div>'}
                </div>
                ${isLogged && activeChat.id ? `
                <div class="input-panel">
                    <input type="text" id="messageTextInput" class="message-input" placeholder="Введите сообщение..." autocomplete="off">
                    <label class="attach-btn" style="cursor:pointer;">📎 Файл<input type="file" id="fileInputAttach" style="display:none;"></label>
                    <button id="sendMsgBtn" class="send-btn">➤ Отправить</button>
                </div>
                ` : '<div class="input-panel"><span style="color:#6c86a3;">💡 Войдите и выберите чат</span></div>'}
            </div>
            <div class="right-panel">
                ${!isLogged ? `
                <div class="info-card"><h3>🔐 Регистрация / Вход</h3>
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPass" placeholder="Пароль (мин 6 символов)">
                    <button id="doRegBtn" style="background:#2dd4bf;color:#0f1724;">Зарегистрироваться</button>
                    <hr>
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPass" placeholder="Пароль">
                    <button id="doLoginBtn" style="background:#2dd4bf;color:#0f1724;">Войти</button>
                    <div id="authMsg" class="error-msg"></div>
                </div>
                ` : `
                <div class="info-card"><h3>👤 Мой профиль</h3>
                    <p><strong>${currentUserData?.displayName || currentUser.email}</strong><br>📧 ${currentUser.email}<br>👥 Друзей: ${friendsList.length}<br>📢 Каналов: ${channelsList.length}<br>💬 Групп: ${groupsList.length}</p>
                    <button id="createChannelBtn" class="small">📢 Создать канал</button>
                    <button id="createGroupBtn" class="small">💬 Создать группу</button>
                </div>
                <div class="info-card"><h3>📁 Файлы</h3><p style="font-size:12px;">Поддерживаются любые форматы. Файлы хранятся в сообщениях.</p></div>
                `}
            </div>
        </div>
        `;
        
        document.getElementById('appRoot').innerHTML = html;
        attachEvents(isLogged, friendsList, friendRequests, channelsList, groupsList);
        
        if (isMobile) {
            const sidebar = document.getElementById('mainSidebar');
            const toggleBtn = document.getElementById('mobileMenuToggle');
            if (toggleBtn) toggleBtn.onclick = () => sidebar.classList.toggle('mobile-open');
        }
    }
    
    function getChatTitle(type, id, friends, channels, groups) {
        if (type === 'friends') {
            const friend = friends.find(f => f.uid === id);
            return friend ? `👤 ${friend.displayName || friend.email}` : '👤 Чат';
        } else if (type === 'channels') {
            const channel = channels.find(c => c.id === id);
            return channel ? `📢 ${channel.name}` : '📢 Канал';
        } else {
            const group = groups.find(g => g.id === id);
            return group ? `💬 ${group.name}` : '💬 Группа';
        }
    }
    
    function renderSidebarList(type, friends, requests, channels, groups) {
        if (type === 'friends') {
            let items = friends.map(f => `<li class="chat-item" data-chat-type="friends" data-chat-id="${f.uid}"><div class="chat-name">👤 ${f.displayName || f.email}</div></li>`);
            if (requests.length > 0) {
                const reqHtml = requests.map(req => `<div style="background:#2a3a4a;margin:8px 0;padding:10px;border-radius:12px;">${req.displayName || req.email} 
                    <button class="acceptReq" data-uid="${req.uid}" style="background:#2dd4bf;border:none;padding:2px 10px;border-radius:20px;margin-left:8px;">✅</button>
                    <button class="declineReq" data-uid="${req.uid}" style="background:#5a1a2a;border:none;padding:2px 10px;border-radius:20px;">❌</button>
                </div>`).join('');
                items.unshift(`<li style="margin-bottom:12px;"><strong>📩 Заявки:</strong> ${reqHtml}</li>`);
            }
            items.push(`<li><input type="text" id="addFriendInput" placeholder="UID друга" style="margin-top:12px;"><button id="addFriendBtn" class="small" style="margin-top:4px;">➕ Добавить друга</button></li>`);
            return items.join('') || '<li style="color:gray;">Нет друзей</li>';
        } else if (type === 'channels') {
            return channels.map(ch => `<li class="chat-item" data-chat-type="channels" data-chat-id="${ch.id}"><div class="chat-name">📢 ${ch.name}</div></li>`).join('') || '<li style="color:gray;">Нет каналов</li>';
        } else {
            return groups.map(g => `<li class="chat-item" data-chat-type="groups" data-chat-id="${g.id}"><div class="chat-name">💬 ${g.name}</div></li>`).join('') || '<li style="color:gray;">Нет групп</li>';
        }
    }
    
    function renderMessagesContainer(messages) {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        if (!messages.length) {
            container.innerHTML = '<div style="color:#6c86a3;text-align:center;margin-top:40px;">✉️ Нет сообщений. Напишите первое!</div>';
            return;
        }
        const html = messages.map(msg => {
            let fileHtml = '';
            if (msg.file) {
                if (msg.file.type?.startsWith('image/')) {
                    fileHtml = `<div style="margin-top:8px;"><img src="${msg.file.url}" style="max-width:200px;border-radius:12px;"><br><a href="${msg.file.url}" download style="color:#2dd4bf;">📎 ${msg.file.name}</a></div>`;
                } else {
                    fileHtml = `<div style="margin-top:8px;"><a href="${msg.file.url}" download style="color:#2dd4bf;">📁 ${msg.file.name}</a></div>`;
                }
            }
            const isOwn = msg.from === currentUser?.uid;
            const time = msg.timestamp?.toDate ? msg.timestamp.toDate().toLocaleTimeString() : '';
            return `<div class="message-bubble ${isOwn ? 'own' : ''}"><strong>${msg.fromName || msg.from}</strong> <span style="font-size:0.7rem;color:#8ba3c0;">${time}</span><br>${msg.text || ''}${fileHtml}</div>`;
        }).join('');
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }
    
    function attachEvents(isLogged, friendsList, requests, channels, groups) {
        // Вкладки
        document.querySelectorAll('.tab-mini').forEach(btn => {
            btn.addEventListener('click', () => {
                activeChat.type = btn.getAttribute('data-side');
                activeChat.id = null;
                if (messagesUnsubscribe) messagesUnsubscribe();
                renderUI();
            });
        });
        
        // Выбор чата
        document.querySelectorAll('.chat-item[data-chat-type]').forEach(el => {
            el.addEventListener('click', () => {
                activeChat.type = el.getAttribute('data-chat-type');
                activeChat.id = el.getAttribute('data-chat-id');
                renderUI();
            });
        });
        
        // Заявки
        document.querySelectorAll('.acceptReq').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); acceptFriendRequest(btn.getAttribute('data-uid')).then(() => renderUI()); });
        });
        document.querySelectorAll('.declineReq').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); declineFriendRequest(btn.getAttribute('data-uid')).then(() => renderUI()); });
        });
        
        // Добавить друга
        const addBtn = document.getElementById('addFriendBtn');
        const addInput = document.getElementById('addFriendInput');
        if (addBtn && addInput) {
            addBtn.onclick = () => { sendFriendRequest(addInput.value).then(() => { addInput.value = ''; renderUI(); }); };
        }
        
        // Отправка сообщений
        const sendBtn = document.getElementById('sendMsgBtn');
        const msgInput = document.getElementById('messageTextInput');
        const fileInput = document.getElementById('fileInputAttach');
        if (sendBtn) {
            sendBtn.onclick = async () => {
                const text = msgInput?.value || '';
                if (fileInput && fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        await sendMessage(activeChat.id, activeChat.type, text, { name: file.name, type: file.type, url: ev.target.result, size: file.size });
                        if (msgInput) msgInput.value = '';
                        fileInput.value = '';
                        renderUI();
                    };
                    reader.readAsDataURL(file);
                } else if (text.trim()) {
                    await sendMessage(activeChat.id, activeChat.type, text);
                    if (msgInput) msgInput.value = '';
                    renderUI();
                }
            };
            if (msgInput) msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
        }
        
        // Кнопки профиля
        document.getElementById('logoutBtn')?.addEventListener('click', () => { auth.signOut(); currentUser = null; currentUserData = null; if (messagesUnsubscribe) messagesUnsubscribe(); renderUI(); });
        document.getElementById('createChannelBtn')?.addEventListener('click', () => { let n = prompt("Название канала:"); if (n) createChannel(n).then(() => renderUI()); });
        document.getElementById('createGroupBtn')?.addEventListener('click', () => { let n = prompt("Название группы:"); if (n) createGroup(n).then(() => renderUI()); });
        
        // Регистрация
        document.getElementById('doRegBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const msgDiv = document.getElementById('authMsg');
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                currentUser = cred.user;
                await initUserProfile(currentUser);
                await loadCurrentUserData();
                renderUI();
            } catch (err) { msgDiv.innerText = err.message; }
        });
        
        // Вход
        document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const msgDiv = document.getElementById('authMsg');
            try {
                const cred = await auth.signInWithEmailAndPassword(email, pass);
                currentUser = cred.user;
                await loadCurrentUserData();
                renderUI();
            } catch (err) { msgDiv.innerText = err.message; }
        });
    }
    
    // ======================== СЛУШАТЕЛЬ АВТОРИЗАЦИИ (СОХРАНЕНИЕ СЕССИИ) ========================
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            await loadCurrentUserData();
        } else {
            currentUser = null;
            currentUserData = null;
            if (messagesUnsubscribe) messagesUnsubscribe();
        }
        renderUI();
    });
    
    // Выбор устройства при первом запуске
    if (!localStorage.getItem('creo_deviceType')) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px;';
        overlay.innerHTML = `<h2 style="color:#2dd4bf;">📱 Выберите режим</h2>
            <div class="device-btn" data-device="pc" style="background:#1e2a3a;border:2px solid #2dd4bf;padding:20px 40px;border-radius:60px;font-size:1.5rem;color:#2dd4bf;cursor:pointer;">💻 ПК</div>
            <div class="device-btn" data-device="phone" style="background:#1e2a3a;border:2px solid #2dd4bf;padding:20px 40px;border-radius:60px;font-size:1.5rem;color:#2dd4bf;cursor:pointer;">📱 Телефон</div>`;
        document.body.appendChild(overlay);
        overlay.querySelectorAll('.device-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentDevice = btn.getAttribute('data-device');
                localStorage.setItem('creo_deviceType', currentDevice);
                overlay.remove();
                renderUI();
            });
        });
    } else {
        renderUI();
    }
</script>
</body>
</html>
