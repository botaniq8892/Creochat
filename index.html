<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CreoChat | Firebase + Живые заявки</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Inter', sans-serif; }
        html, body { width: 100%; height: 100%; background: #0e121c; overflow: hidden; }
        .creochat-app { width: 100vw; height: 100vh; background: #0f1724; display: flex; flex-direction: column; overflow: hidden; position: fixed; top: 0; left: 0; }
        .main-header { background: #1a2332; padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3a4e; flex-wrap: wrap; gap: 10px; }
        .logo-area { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .logo-area h1 { font-size: 1.4rem; color: #2dd4bf; }
        .device-badge { background: #0d1b2a; padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; color: #2dd4bf; border: 1px solid #2dd4bf40; }
        .uid-block { background: #0d1b2a; padding: 6px 14px; border-radius: 40px; display: flex; align-items: center; gap: 12px; font-size: 0.75rem; border: 1px solid #2dd4bf40; }
        .uid-block span { color: #8ba3c0; font-family: monospace; font-size: 0.7rem; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        .copy-uid-btn { background: #2dd4bf20; border: 1px solid #2dd4bf; padding: 4px 10px; border-radius: 30px; cursor: pointer; font-size: 0.7rem; color: #2dd4bf; transition: 0.2s; }
        .shield-badges { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .shield-badges span { background: #0d1b2a; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; color: #5ee0d0; }
        .messenger-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        .sidebar { width: 340px; background: #111827; border-right: 1px solid #1f2a3e; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #1f2a3e; }
        .tabs-mini { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-mini { flex: 1; background: #1e2a3a; border: none; padding: 10px; border-radius: 28px; color: #9ca3af; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .tab-mini.active { background: #2dd4bf20; color: #2dd4bf; border: 1px solid #2dd4bf; }
        .chat-list { list-style: none; padding: 0 12px; }
        .chat-item { background: #1a2536; margin: 8px 0; padding: 14px; border-radius: 16px; cursor: pointer; transition: 0.1s; border-left: 3px solid #2dd4bf; }
        .chat-item:hover { background: #243447; }
        .chat-name { font-weight: bold; color: #e2e8f0; }
        .requests-block { background: #1a2a3a; margin: 8px 0; padding: 12px; border-radius: 16px; border-left: 3px solid #ffaa33; }
        .request-item { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; padding: 8px; background: #0f1724; border-radius: 12px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0f1724; min-width: 0; }
        .chat-header { padding: 16px 24px; background: #1a2536; border-bottom: 1px solid #2d3a4e; flex-shrink: 0; }
        .chat-header strong { font-size: 1.2rem; color: #2dd4bf; }
        .messages-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
        .message-bubble { max-width: 65%; padding: 12px 18px; border-radius: 24px; background: #1e2a3a; color: #e2e8f0; align-self: flex-start; word-break: break-word; }
        .message-bubble.own { align-self: flex-end; background: #2dd4bf20; border: 1px solid #2dd4bf; }
        .input-panel { background: #1a2536; padding: 16px 24px; display: flex; gap: 12px; align-items: center; border-top: 1px solid #2d3a4e; flex-shrink: 0; }
        .attach-btn { background: #2d3a4e; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; color: white; }
        .message-input { flex: 1; background: #0f1724; border: 1px solid #2d3a4e; padding: 12px 18px; border-radius: 40px; color: white; outline: none; }
        .send-btn { background: #2dd4bf; border: none; padding: 12px 28px; border-radius: 40px; font-weight: bold; color: #0f1724; cursor: pointer; }
        .right-panel { width: 320px; background: #111827; border-left: 1px solid #1f2a3e; padding: 20px; overflow-y: auto; flex-shrink: 0; }
        .info-card { background: #1a2536; border-radius: 24px; padding: 18px; margin-bottom: 20px; }
        .info-card h3 { color: #2dd4bf; margin-bottom: 12px; font-size: 1rem; }
        button.small { padding: 8px 16px; font-size: 0.8rem; background: #2d3a4e; border: none; border-radius: 30px; color: white; cursor: pointer; width: 100%; margin-top: 8px; }
        button.success-btn { background: #2dd4bf; color: #0f1724; font-weight: bold; }
        .uid-display-row { display: flex; align-items: center; justify-content: space-between; background: #0f1724; padding: 8px 12px; border-radius: 30px; margin: 8px 0; gap: 8px; }
        input { background: #0f1724; border: 1px solid #2d3a4e; padding: 10px 14px; border-radius: 30px; color: white; width: 100%; margin-bottom: 10px; outline: none; }
        hr { border-color: #2d3a4e; margin: 12px 0; }
        .toast-copy { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2dd4bf; color: #0f1724; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; font-weight: bold; z-index: 1000; animation: fadeOut 2s ease forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @media (max-width: 900px) { .right-panel { width: 280px; } }
        @media (max-width: 768px) { .sidebar { position: fixed; left: 0; top: 56px; height: calc(100% - 56px); z-index: 100; transform: translateX(-100%); width: 280px; transition: transform 0.3s; } .sidebar.mobile-open { transform: translateX(0); } .mobile-menu-btn { display: block; } .message-bubble { max-width: 85%; } }
        .mobile-menu-btn { display: none; background: #2d3a4e; border: none; padding: 8px 14px; border-radius: 20px; color: white; cursor: pointer; }
        .refresh-btn { background: #2d3a4e; border: none; padding: 6px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 0.7rem; margin-left: 8px; }
    </style>
</head>
<body>
<div id="appRoot" class="creochat-app"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCN1nSMxZDtXPx45-ruKr6He85gLOafEJY",
        authDomain: "creochat.firebaseapp.com",
        projectId: "creochat",
        storageBucket: "creochat.firebasestorage.app",
        messagingSenderId: "326245083693",
        appId: "1:326245083693:web:a3fd8e44e11d5a3d9366a4",
        measurementId: "G-63SHRQWWRJ"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    
    let currentUser = null;
    let currentUserData = null;
    let activeChat = { type: 'friends', id: null };
    let currentDevice = localStorage.getItem('creo_deviceType') || 'pc';
    let messagesUnsubscribe = null;
    let friendsUnsubscribe = null;
    let requestsUnsubscribe = null;
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast-copy';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    async function copyToClipboard(text) {
        try { await navigator.clipboard.writeText(text); showToast('✅ UID скопирован!'); } 
        catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('✅ UID скопирован!'); }
    }
    
    async function initUserProfile(user) {
        const userRef = db.collection('users').doc(user.uid);
        const doc = await userRef.get();
        if (!doc.exists) {
            const profile = { uid: user.uid, email: user.email, displayName: user.email.split('@')[0], friends: [], friendRequests: [], channels: [], groups: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() };
            await userRef.set(profile);
            return profile;
        }
        return doc.data();
    }
    
    async function loadCurrentUserData() {
        if (currentUser) {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) currentUserData = { uid: currentUser.uid, ...doc.data() };
        }
    }
    
    // Живая подписка на заявки
    function subscribeToRequests(callback) {
        if (!currentUser) return null;
        return db.collection('users').doc(currentUser.uid)
            .onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    currentUserData = { uid: currentUser.uid, ...data };
                    callback(data.friendRequests || []);
                }
            });
    }
    
    // Живая подписка на друзей
    function subscribeToFriends(callback) {
        if (!currentUser) return null;
        return db.collection('users').doc(currentUser.uid)
            .onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    currentUserData = { uid: currentUser.uid, ...data };
                    callback(data.friends || []);
                }
            });
    }
    
    async function sendFriendRequest(targetUid) {
        if (!currentUser || targetUid === currentUser.uid) { showToast('❌ Нельзя добавить себя'); return; }
        const targetRef = db.collection('users').doc(targetUid);
        const targetDoc = await targetRef.get();
        if (!targetDoc.exists) { showToast('❌ Пользователь не найден'); return; }
        const currentRequests = targetDoc.data().friendRequests || [];
        if (currentRequests.includes(currentUser.uid)) { showToast('⚠️ Заявка уже отправлена'); return; }
        await targetRef.update({ friendRequests: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
        showToast('✅ Заявка отправлена!');
    }
    
    async function acceptFriendRequest(fromUid) {
        if (!currentUserData) return;
        await db.collection('users').doc(currentUser.uid).update({
            friends: firebase.firestore.FieldValue.arrayUnion(fromUid),
            friendRequests: firebase.firestore.FieldValue.arrayRemove(fromUid)
        });
        await db.collection('users').doc(fromUid).update({
            friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
        });
        showToast('✅ Друг добавлен!');
    }
    
    async function declineFriendRequest(fromUid) {
        await db.collection('users').doc(currentUser.uid).update({
            friendRequests: firebase.firestore.FieldValue.arrayRemove(fromUid)
        });
        showToast('❌ Заявка отклонена');
    }
    
    async function createChannel(name) {
        if (!name || !currentUser) return;
        const channelRef = db.collection('channels').doc();
        await channelRef.set({ name, owner: currentUser.uid, members: [currentUser.uid], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection('users').doc(currentUser.uid).update({ channels: firebase.firestore.FieldValue.arrayUnion(channelRef.id) });
        showToast(`📢 Канал "${name}" создан`);
    }
    
    async function createGroup(name) {
        if (!name || !currentUser) return;
        const groupRef = db.collection('groups').doc();
        await groupRef.set({ name, owner: currentUser.uid, members: [currentUser.uid], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection('users').doc(currentUser.uid).update({ groups: firebase.firestore.FieldValue.arrayUnion(groupRef.id) });
        showToast(`💬 Группа "${name}" создана`);
    }
    
    async function getUserChannels() {
        if (!currentUserData?.channels) return [];
        const channels = [];
        for (const id of currentUserData.channels) {
            const doc = await db.collection('channels').doc(id).get();
            if (doc.exists) channels.push({ id, ...doc.data() });
        }
        return channels;
    }
    
    async function getUserGroups() {
        if (!currentUserData?.groups) return [];
        const groups = [];
        for (const id of currentUserData.groups) {
            const doc = await db.collection('groups').doc(id).get();
            if (doc.exists) groups.push({ id, ...doc.data() });
        }
        return groups;
    }
    
    async function sendMessage(chatId, chatType, text, fileData = null) {
        if (!currentUser || !chatId) return;
        await db.collection('messages').add({
            chatId, chatType, from: currentUser.uid,
            fromName: currentUserData?.displayName || currentUser.email,
            text: text || '', file: fileData || null,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    
    function subscribeToMessages(chatId, chatType, callback) {
        return db.collection('messages').where('chatId', '==', chatId).where('chatType', '==', chatType).orderBy('timestamp', 'asc')
            .onSnapshot(snapshot => { const msgs = []; snapshot.forEach(d => msgs.push({ id: d.id, ...d.data() })); callback(msgs); });
    }
    
    // Получение данных о друзьях по UID
    async function getFriendsData(uidList) {
        const result = [];
        for (const uid of uidList) {
            const doc = await db.collection('users').doc(uid).get();
            if (doc.exists) result.push({ uid, ...doc.data() });
        }
        return result;
    }
    
    async function getRequestsData(uidList) {
        const result = [];
        for (const uid of uidList) {
            const doc = await db.collection('users').doc(uid).get();
            if (doc.exists) result.push({ uid, ...doc.data() });
        }
        return result;
    }
    
    // Рендер с живыми данными
    let currentFriendsList = [];
    let currentRequestsList = [];
    
    async function updateAndRender() {
        if (!currentUser || !currentUserData) {
            renderUIStatic();
            return;
        }
        currentFriendsList = await getFriendsData(currentUserData.friends || []);
        currentRequestsList = await getRequestsData(currentUserData.friendRequests || []);
        const channelsList = await getUserChannels();
        const groupsList = await getUserGroups();
        renderUIWithData(currentFriendsList, currentRequestsList, channelsList, groupsList);
    }
    
    function renderUIStatic() {
        const isLogged = !!currentUser;
        const isMobile = (currentDevice === 'phone') || (window.innerWidth <= 768);
        const userUid = currentUser?.uid;
        const html = `
        <div class="main-header">
            <div class="logo-area">
                ${isMobile ? `<button id="mobileMenuToggle" class="mobile-menu-btn">☰</button>` : ''}
                <h1>🔥 CreoChat</h1>
                <div class="device-badge">${currentDevice === 'phone' ? '📱 Мобильный' : '💻 ПК'}</div>
                ${isLogged && userUid ? `<div class="uid-block"><span>🆔 Ваш UID: <strong>${userUid.substring(0, 12)}...</strong></span><button class="copy-uid-btn" id="copyHeaderUidBtn">📋 Копировать</button></div>` : ''}
            </div>
            <div class="shield-badges">
                <span>🔥 Firebase</span><span>🔐 Живые заявки</span>
                ${isLogged ? `<span>👤 ${currentUser.email}</span><button id="logoutBtn" style="background:#2d3a4e;border:none;padding:4px 14px;border-radius:20px;cursor:pointer;">Выйти</button>` : '<span>🔐 Не авторизован</span>'}
            </div>
        </div>
        <div class="messenger-layout">
            <div class="sidebar" id="mainSidebar">
                <div class="sidebar-header">
                    <div class="tabs-mini">
                        <button class="tab-mini ${activeChat.type === 'friends' ? 'active' : ''}" data-side="friends">👥 Друзья</button>
                        <button class="tab-mini ${activeChat.type === 'channels' ? 'active' : ''}" data-side="channels">📢 Каналы</button>
                        <button class="tab-mini ${activeChat.type === 'groups' ? 'active' : ''}" data-side="groups">💬 Группы</button>
                    </div>
                </div>
                <ul class="chat-list" id="chatListSidebar"><li style="color:gray;padding:12px;">Загрузка...</li></ul>
            </div>
            <div class="chat-area">
                <div class="chat-header"><strong>📡 Выберите чат</strong></div>
                <div class="messages-container" id="messagesContainer"><div style="color:#6c86a3;text-align:center;margin-top:40px;">💬 Выберите чат слева</div></div>
                <div class="input-panel"><span style="color:#6c86a3;">💡 Войдите и выберите чат</span></div>
            </div>
            <div class="right-panel">
                ${!isLogged ? `
                <div class="info-card"><h3>🔐 Регистрация / Вход</h3>
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPass" placeholder="Пароль (мин 6)">
                    <button id="doRegBtn" class="success-btn" style="width:100%;">Зарегистрироваться</button>
                    <hr>
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPass" placeholder="Пароль">
                    <button id="doLoginBtn" class="success-btn" style="width:100%;">Войти</button>
                    <div id="authMsg" style="color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center;"></div>
                </div>` : `
                <div class="info-card"><h3>👤 Мой профиль</h3>
                    <p><strong>${currentUser.email}</strong><br>📧 ${currentUser.email}</p>
                    <div class="uid-display-row"><span style="font-family:monospace;font-size:0.7rem;">🆔 ${currentUser.uid}</span><button class="copy-btn-inline" id="copyProfileUidBtn" style="background:#2dd4bf20;border:1px solid #2dd4bf;padding:4px 12px;border-radius:30px;cursor:pointer;">📋 Копировать</button></div>
                    <button id="createChannelBtn" class="small">📢 Создать канал</button>
                    <button id="createGroupBtn" class="small">💬 Создать группу</button>
                </div>
                <div class="info-card"><h3>➕ Добавить друга по UID</h3>
                    <input type="text" id="addFriendByUid" placeholder="Введите UID друга">
                    <button id="sendFriendRequestBtn" class="success-btn" style="width:100%;">📨 Отправить заявку</button>
                </div>`}
            </div>
        </div>`;
        document.getElementById('appRoot').innerHTML = html;
        attachCommonEvents(isLogged, userUid);
    }
    
    function renderUIWithData(friendsList, requestsList, channelsList, groupsList) {
        const isLogged = !!currentUser;
        const isMobile = (currentDevice === 'phone') || (window.innerWidth <= 768);
        const userUid = currentUser?.uid;
        
        // Подписка на сообщения если есть активный чат
        if (activeChat.id) {
            if (messagesUnsubscribe) messagesUnsubscribe();
            messagesUnsubscribe = subscribeToMessages(activeChat.id, activeChat.type, (msgs) => renderMessagesContainer(msgs));
        }
        
        const sidebarContent = renderSidebarContent(activeChat.type, friendsList, requestsList, channelsList, groupsList, userUid);
        
        const html = `
        <div class="main-header">
            <div class="logo-area">
                ${isMobile ? `<button id="mobileMenuToggle" class="mobile-menu-btn">☰</button>` : ''}
                <h1>🔥 CreoChat</h1>
                <div class="device-badge">${currentDevice === 'phone' ? '📱 Мобильный' : '💻 ПК'}</div>
                ${isLogged && userUid ? `<div class="uid-block"><span>🆔 Ваш UID: <strong>${userUid.substring(0, 12)}...</strong></span><button class="copy-uid-btn" id="copyHeaderUidBtn">📋 Копировать</button></div>` : ''}
            </div>
            <div class="shield-badges">
                <span>🔥 Firebase</span><span>🔐 Живые заявки</span>
                ${isLogged ? `<span>👤 ${currentUser.email}</span><button id="logoutBtn" style="background:#2d3a4e;border:none;padding:4px 14px;border-radius:20px;cursor:pointer;">Выйти</button>` : '<span>🔐 Не авторизован</span>'}
            </div>
        </div>
        <div class="messenger-layout">
            <div class="sidebar" id="mainSidebar">
                <div class="sidebar-header">
                    <div class="tabs-mini">
                        <button class="tab-mini ${activeChat.type === 'friends' ? 'active' : ''}" data-side="friends">👥 Друзья (${friendsList.length})</button>
                        <button class="tab-mini ${activeChat.type === 'channels' ? 'active' : ''}" data-side="channels">📢 Каналы (${channelsList.length})</button>
                        <button class="tab-mini ${activeChat.type === 'groups' ? 'active' : ''}" data-side="groups">💬 Группы (${groupsList.length})</button>
                    </div>
                </div>
                <ul class="chat-list" id="chatListSidebar">${sidebarContent}</ul>
            </div>
            <div class="chat-area">
                <div class="chat-header"><strong>${activeChat.id ? getChatTitle(activeChat.type, activeChat.id, friendsList, channelsList, groupsList) : '📡 Выберите чат'}</strong></div>
                <div class="messages-container" id="messagesContainer">${!activeChat.id ? '<div style="color:#6c86a3;text-align:center;margin-top:40px;">💬 Выберите чат слева</div>' : '<div class="loading">Загрузка...</div>'}</div>
                ${isLogged && activeChat.id ? `
                <div class="input-panel">
                    <input type="text" id="messageTextInput" class="message-input" placeholder="Введите сообщение...">
                    <label class="attach-btn" style="cursor:pointer;">📎 Файл<input type="file" id="fileInputAttach" style="display:none;"></label>
                    <button id="sendMsgBtn" class="send-btn">➤ Отправить</button>
                </div>` : '<div class="input-panel"><span style="color:#6c86a3;">💡 Войдите и выберите чат</span></div>'}
            </div>
            <div class="right-panel">
                ${!isLogged ? `
                <div class="info-card"><h3>🔐 Регистрация / Вход</h3>
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPass" placeholder="Пароль (мин 6)">
                    <button id="doRegBtn" class="success-btn" style="width:100%;">Зарегистрироваться</button>
                    <hr>
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPass" placeholder="Пароль">
                    <button id="doLoginBtn" class="success-btn" style="width:100%;">Войти</button>
                    <div id="authMsg" style="color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center;"></div>
                </div>` : `
                <div class="info-card"><h3>👤 Мой профиль</h3>
                    <p><strong>${currentUser.email}</strong><br>📧 ${currentUser.email}</p>
                    <div class="uid-display-row"><span style="font-family:monospace;font-size:0.7rem;">🆔 ${currentUser.uid}</span><button class="copy-btn-inline" id="copyProfileUidBtn" style="background:#2dd4bf20;border:1px solid #2dd4bf;padding:4px 12px;border-radius:30px;cursor:pointer;">📋 Копировать</button></div>
                    <p>👥 Друзей: ${friendsList.length}<br>📢 Каналов: ${channelsList.length}<br>💬 Групп: ${groupsList.length}</p>
                    <button id="createChannelBtn" class="small">📢 Создать канал</button>
                    <button id="createGroupBtn" class="small">💬 Создать группу</button>
                </div>
                <div class="info-card"><h3>➕ Добавить друга по UID</h3>
                    <input type="text" id="addFriendByUid" placeholder="Введите UID друга">
                    <button id="sendFriendRequestBtn" class="success-btn" style="width:100%;">📨 Отправить заявку</button>
                </div>`}
            </div>
        </div>`;
        
        document.getElementById('appRoot').innerHTML = html;
        attachCommonEvents(isLogged, userUid);
        attachChatEvents();
        attachRequestButtons(requestsList);
        attachFriendButtons(friendsList, channelsList, groupsList);
        
        if (isMobile) { const sb = document.getElementById('mainSidebar'); const tb = document.getElementById('mobileMenuToggle'); if(tb) tb.onclick = () => sb.classList.toggle('mobile-open'); }
    }
    
    function renderSidebarContent(type, friends, requests, channels, groups, userUid) {
        if (type === 'friends') {
            let requestsHtml = '';
            if (requests.length > 0) {
                requestsHtml = `<div class="requests-block"><strong style="color:#ffaa33;">📩 Входящие заявки (${requests.length}):</strong>${requests.map(r => `
                    <div class="request-item" data-request-uid="${r.uid}">
                        <span>👤 ${r.displayName || r.email}</span>
                        <div><button class="acceptReqBtn" data-uid="${r.uid}" style="background:#2dd4bf;border:none;padding:4px 12px;border-radius:20px;margin-right:6px;cursor:pointer;">✅ Принять</button>
                        <button class="declineReqBtn" data-uid="${r.uid}" style="background:#5a1a2a;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;">❌ Отклонить</button></div>
                    </div>`).join('')}</div>`;
            }
            let friendsHtml = friends.map(f => `<li class="chat-item" data-chat-type="friends" data-chat-id="${f.uid}"><div class="chat-name">👤 ${f.displayName || f.email}</div></li>`).join('');
            if (friendsHtml === '') friendsHtml = '<li style="color:gray;padding:12px;">🤝 Нет друзей. Отправьте заявку по UID!</li>';
            return requestsHtml + friendsHtml;
        } else if (type === 'channels') {
            return channels.map(ch => `<li class="chat-item" data-chat-type="channels" data-chat-id="${ch.id}"><div class="chat-name">📢 ${ch.name}</div></li>`).join('') || '<li style="color:gray;">Нет каналов</li>';
        } else {
            return groups.map(g => `<li class="chat-item" data-chat-type="groups" data-chat-id="${g.id}"><div class="chat-name">💬 ${g.name}</div></li>`).join('') || '<li style="color:gray;">Нет групп</li>';
        }
    }
    
    function getChatTitle(type, id, friends, channels, groups) {
        if (type === 'friends') { const f = friends.find(f => f.uid === id); return f ? `👤 ${f.displayName || f.email}` : '👤 Чат'; }
        else if (type === 'channels') { const c = channels.find(c => c.id === id); return c ? `📢 ${c.name}` : '📢 Канал'; }
        else { const g = groups.find(g => g.id === id); return g ? `💬 ${g.name}` : '💬 Группа'; }
    }
    
    function renderMessagesContainer(messages) {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        if (!messages.length) { container.innerHTML = '<div style="color:#6c86a3;text-align:center;margin-top:40px;">✉️ Нет сообщений. Напишите первое!</div>'; return; }
        const html = messages.map(msg => {
            let fileHtml = '';
            if (msg.file) {
                if (msg.file.type?.startsWith('image/')) fileHtml = `<div style="margin-top:8px;"><img src="${msg.file.url}" style="max-width:200px;border-radius:12px;"><br><a href="${msg.file.url}" download style="color:#2dd4bf;">📎 ${msg.file.name}</a></div>`;
                else fileHtml = `<div style="margin-top:8px;"><a href="${msg.file.url}" download style="color:#2dd4bf;">📁 ${msg.file.name}</a></div>`;
            }
            const isOwn = msg.from === currentUser?.uid;
            const time = msg.timestamp?.toDate ? msg.timestamp.toDate().toLocaleTimeString() : '';
            return `<div class="message-bubble ${isOwn ? 'own' : ''}"><strong>${msg.fromName || msg.from}</strong> <span style="font-size:0.7rem;color:#8ba3c0;">${time}</span><br>${msg.text || ''}${fileHtml}</div>`;
        }).join('');
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }
    
    function attachCommonEvents(isLogged, userUid) {
        document.getElementById('copyHeaderUidBtn')?.addEventListener('click', () => userUid && copyToClipboard(userUid));
        document.getElementById('copyProfileUidBtn')?.addEventListener('click', () => userUid && copyToClipboard(userUid));
        
        document.querySelectorAll('.tab-mini').forEach(btn => {
            btn.addEventListener('click', () => { activeChat.type = btn.getAttribute('data-side'); activeChat.id = null; if(messagesUnsubscribe) messagesUnsubscribe(); updateAndRender(); });
        });
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => { auth.signOut(); currentUser = null; currentUserData = null; if(messagesUnsubscribe) messagesUnsubscribe(); if(friendsUnsubscribe) friendsUnsubscribe(); if(requestsUnsubscribe) requestsUnsubscribe(); updateAndRender(); });
        document.getElementById('createChannelBtn')?.addEventListener('click', () => { let n = prompt("Название канала:"); if(n) createChannel(n).then(() => updateAndRender()); });
        document.getElementById('createGroupBtn')?.addEventListener('click', () => { let n = prompt("Название группы:"); if(n) createGroup(n).then(() => updateAndRender()); });
        
        const sendReqBtn = document.getElementById('sendFriendRequestBtn');
        const addUidInput = document.getElementById('addFriendByUid');
        if (sendReqBtn && addUidInput) {
            sendReqBtn.onclick = () => { const uid = addUidInput.value.trim(); if(uid) sendFriendRequest(uid).then(() => { addUidInput.value = ''; }); else showToast('❌ Введите UID'); };
        }
        
        document.getElementById('doRegBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value;
            try { const cred = await auth.createUserWithEmailAndPassword(email, pass); currentUser = cred.user; await initUserProfile(currentUser); await loadCurrentUserData(); setupRealtimeSubscriptions(); updateAndRender(); } 
            catch(err) { document.getElementById('authMsg').innerText = err.message; }
        });
        document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value, pass = document.getElementById('loginPass').value;
            try { const cred = await auth.signInWithEmailAndPassword(email, pass); currentUser = cred.user; await loadCurrentUserData(); setupRealtimeSubscriptions(); updateAndRender(); } 
            catch(err) { document.getElementById('authMsg').innerText = err.message; }
        });
    }
    
    function attachChatEvents() {
        document.querySelectorAll('.chat-item[data-chat-type]').forEach(el => {
            el.addEventListener('click', () => { activeChat.type = el.getAttribute('data-chat-type'); activeChat.id = el.getAttribute('data-chat-id'); updateAndRender(); });
        });
        
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const msgInput = document.getElementById('messageTextInput');
        const fileInput = document.getElementById('fileInputAttach');
        if (sendMsgBtn) {
            sendMsgBtn.onclick = async () => {
                const text = msgInput?.value || '';
                if (fileInput?.files.length > 0) {
                    const file = fileInput.files[0];
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        await sendMessage(activeChat.id, activeChat.type, text, { name: file.name, type: file.type, url: ev.target.result, size: file.size });
                        if(msgInput) msgInput.value = '';
                        fileInput.value = '';
                        updateAndRender();
                    };
                    reader.readAsDataURL(file);
                } else if (text.trim()) {
                    await sendMessage(activeChat.id, activeChat.type, text);
                    if(msgInput) msgInput.value = '';
                    updateAndRender();
                }
            };
            if(msgInput) msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsgBtn.click(); });
        }
    }
    
    function attachRequestButtons(requestsList) {
        document.querySelectorAll('.acceptReqBtn').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); acceptFriendRequest(btn.getAttribute('data-uid')).then(() => updateAndRender()); });
        });
        document.querySelectorAll('.declineReqBtn').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); declineFriendRequest(btn.getAttribute('data-uid')).then(() => updateAndRender()); });
        });
    }
    
    function attachFriendButtons(friendsList, channelsList, groupsList) {
        // уже обработано в attachChatEvents
    }
    
    function setupRealtimeSubscriptions() {
        if (friendsUnsubscribe) friendsUnsubscribe();
        if (requestsUnsubscribe) requestsUnsubscribe();
        if (!currentUser) return;
        friendsUnsubscribe = db.collection('users').doc(currentUser.uid).onSnapshot(() => updateAndRender());
        requestsUnsubscribe = db.collection('users').doc(currentUser.uid).onSnapshot(() => updateAndRender());
    }
    
    auth.onAuthStateChanged(async (user) => {
        if (user) { currentUser = user; await loadCurrentUserData(); setupRealtimeSubscriptions(); updateAndRender(); } 
        else { currentUser = null; currentUserData = null; if(messagesUnsubscribe) messagesUnsubscribe(); if(friendsUnsubscribe) friendsUnsubscribe(); if(requestsUnsubscribe) requestsUnsubscribe(); updateAndRender(); }
    });
    
    if (!localStorage.getItem('creo_deviceType')) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px;';
        overlay.innerHTML = `<h2 style="color:#2dd4bf;">📱 Выберите режим</h2>
            <div class="device-btn" data-device="pc" style="background:#1e2a3a;border:2px solid #2dd4bf;padding:20px 40px;border-radius:60px;font-size:1.5rem;color:#2dd4bf;cursor:pointer;">💻 ПК</div>
            <div class="device-btn" data-device="phone" style="background:#1e2a3a;border:2px solid #2dd4bf;padding:20px 40px;border-radius:60px;font-size:1.5rem;color:#2dd4bf;cursor:pointer;">📱 Телефон</div>`;
        document.body.appendChild(overlay);
        overlay.querySelectorAll('.device-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentDevice = btn.getAttribute('data-device'); localStorage.setItem('creo_deviceType', currentDevice); overlay.remove(); updateAndRender(); });
        });
    } else { updateAndRender(); }
</script>
</body>
</html>
